<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Norway Ancestry Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --surface2: #0f3460;
  --text: #e8e8e8;
  --text-dim: #a0a0b8;
  --accent: #e94560;
  --seltveit: #4fc3f7;
  --anderson: #81c784;
  --kittelson: #ffb74d;
  --slinde: #ce93d8;
  --tudahl: #ff8a65;
  --birth: #4fc3f7;
  --death: #ef5350;
  --marriage: #e91e63;
  --census: #78909c;
  --residence: #8d6e63;
  --baptism: #7e57c2;
  --confirmation: #5c6bc0;
  --burial: #546e7a;
  --emigration: #26a69a;
  --immigration: #66bb6a;
  --event: #ffa726;
  --christening: #ab47bc;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  width: 100vw;
  overflow: hidden;
  position: relative;
}

#map {
  width: 100%;
  height: 100%;
  z-index: 1;
}

/* Top bar */
.top-bar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  background: linear-gradient(180deg, rgba(26,26,46,0.95) 0%, rgba(26,26,46,0.7) 80%, transparent 100%);
  padding: 12px 16px 24px;
  pointer-events: none;
}

.top-bar h1 {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.5px;
  color: #fff;
  pointer-events: auto;
  text-shadow: 0 2px 8px rgba(0,0,0,0.5);
}

.top-bar .subtitle {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 2px;
  letter-spacing: 0.3px;
  pointer-events: auto;
}

/* Search bar */
.search-container {
  position: fixed;
  top: 64px;
  left: 12px;
  right: 12px;
  z-index: 1000;
}

.search-input {
  width: 100%;
  padding: 10px 16px 10px 40px;
  border: none;
  border-radius: 12px;
  background: rgba(22,33,62,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  outline: none;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  transition: box-shadow 0.2s;
}

.search-input:focus {
  box-shadow: 0 4px 20px rgba(233,69,96,0.2), 0 0 0 1px rgba(233,69,96,0.3);
}

.search-input::placeholder { color: var(--text-dim); }

.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  font-size: 16px;
}

.search-results {
  margin-top: 4px;
  background: rgba(22,33,62,0.95);
  backdrop-filter: blur(12px);
  border-radius: 12px;
  max-height: 240px;
  overflow-y: auto;
  display: none;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

.search-results.active { display: block; }

.search-result-item {
  padding: 10px 16px;
  cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  transition: background 0.15s;
}

.search-result-item:hover, .search-result-item:active {
  background: rgba(233,69,96,0.1);
}

.search-result-item .name {
  font-weight: 600;
  font-size: 13px;
}

.search-result-item .detail {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 2px;
}

/* Locate button */
/* Layer switcher */
.layers-btn {
  position: fixed;
  bottom: 232px;
  right: 16px;
  z-index: 1001;
  width: 44px;
  height: 44px;
  border-radius: 12px;
  border: none;
  background: rgba(22,33,62,0.92);
  backdrop-filter: blur(12px);
  color: var(--text);
  font-size: 20px;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.layers-btn:active {
  transform: scale(0.92);
}

.layers-btn.open {
  background: var(--accent);
  color: #fff;
}

.layers-panel {
  position: fixed;
  bottom: 284px;
  right: 16px;
  z-index: 1002;
  background: rgba(22,33,62,0.95);
  backdrop-filter: blur(16px);
  border-radius: 14px;
  padding: 8px 6px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  display: none;
  min-width: 180px;
}

.layers-panel.active { display: block; }

.layer-option {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.15s;
  border: none;
  background: none;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  width: 100%;
  text-align: left;
}

.layer-option:hover, .layer-option:active {
  background: rgba(255,255,255,0.08);
}

.layer-option.active {
  background: rgba(233,69,96,0.15);
  color: #fff;
}

.layer-option .layer-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  border: 2px solid var(--text-dim);
  flex-shrink: 0;
}

.layer-option.active .layer-dot {
  background: var(--accent);
  border-color: var(--accent);
}

.locate-btn {
  position: fixed;
  bottom: 180px;
  right: 16px;
  z-index: 1001;
  width: 44px;
  height: 44px;
  border-radius: 12px;
  border: none;
  background: rgba(22,33,62,0.92);
  backdrop-filter: blur(12px);
  color: var(--text);
  font-size: 20px;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.locate-btn:active {
  transform: scale(0.92);
  background: var(--accent);
}

.locate-btn.tracking {
  background: var(--accent);
  color: #fff;
}

/* Bottom panel */
.bottom-panel {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}

.bottom-panel.collapsed .panel-filters {
  display: none;
}

.panel-handle {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 8px 0 4px;
  cursor: pointer;
  gap: 6px;
}

.panel-handle-bar {
  width: 36px;
  height: 4px;
  border-radius: 2px;
  background: rgba(255,255,255,0.2);
}

.panel-chevron {
  font-size: 12px;
  color: rgba(255,255,255,0.35);
  transition: transform 0.3s;
}

.bottom-panel.collapsed .panel-chevron {
  transform: rotate(180deg);
}

.panel-content {
  background: rgba(22,33,62,0.95);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: 20px 20px 0 0;
  padding: 4px 16px 20px;
  max-height: 50vh;
  overflow-y: auto;
  box-shadow: 0 -4px 32px rgba(0,0,0,0.4);
}

.filter-section {
  margin-bottom: 16px;
}

.filter-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-dim);
  margin-bottom: 8px;
}

.family-filters {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.family-btn {
  padding: 6px 14px;
  border-radius: 20px;
  border: 2px solid;
  background: transparent;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.family-btn[data-family="Seltveit"] { border-color: var(--seltveit); }
.family-btn[data-family="Anderson"] { border-color: var(--anderson); }
.family-btn[data-family="Kittelson"] { border-color: var(--kittelson); }
.family-btn[data-family="Slinde"] { border-color: var(--slinde); }
.family-btn[data-family="Tudahl"] { border-color: var(--tudahl); }

.family-btn.active[data-family="Seltveit"] { background: var(--seltveit); color: #1a1a2e; }
.family-btn.active[data-family="Anderson"] { background: var(--anderson); color: #1a1a2e; }
.family-btn.active[data-family="Kittelson"] { background: var(--kittelson); color: #1a1a2e; }
.family-btn.active[data-family="Slinde"] { background: var(--slinde); color: #1a1a2e; }
.family-btn.active[data-family="Tudahl"] { background: var(--tudahl); color: #1a1a2e; }

.family-btn.select-all {
  border-color: var(--accent);
}

.family-btn.select-all.active {
  background: var(--accent);
  color: #fff;
}

.event-filters {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.event-btn {
  padding: 4px 10px;
  border-radius: 14px;
  border: 1.5px solid rgba(255,255,255,0.15);
  background: transparent;
  color: var(--text-dim);
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.event-btn.active {
  border-color: rgba(255,255,255,0.4);
  background: rgba(255,255,255,0.1);
  color: var(--text);
}

.stats-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-top: 1px solid rgba(255,255,255,0.06);
  margin-top: 8px;
}

.stat {
  font-size: 12px;
  color: var(--text-dim);
}

.stat strong {
  color: var(--accent);
  font-weight: 700;
}

/* Event detail popup */
.leaflet-popup-content-wrapper {
  background: rgba(22,33,62,0.95) !important;
  backdrop-filter: blur(12px);
  border-radius: 14px !important;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
  border: 1px solid rgba(255,255,255,0.08) !important;
  max-width: 320px !important;
}

.leaflet-popup-content {
  color: var(--text) !important;
  font-family: 'DM Sans', sans-serif !important;
  margin: 14px 16px !important;
  font-size: 15px !important;
  max-height: 400px;
  overflow-y: auto;
}

.leaflet-popup-tip {
  background: rgba(22,33,62,0.95) !important;
}

.popup-location {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 8px;
  color: #fff;
}

.popup-event {
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.popup-event:last-child { border-bottom: none; }

.popup-event-type {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 8px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 5px;
}

.popup-person {
  font-weight: 600;
  font-size: 15px;
}

.popup-date {
  color: var(--text-dim);
  font-size: 13px;
  margin-top: 2px;
}

.popup-note {
  font-size: 12px;
  color: var(--text-dim);
  font-style: italic;
  margin-top: 3px;
  line-height: 1.4;
}

.popup-families {
  display: flex;
  gap: 4px;
  margin-top: 4px;
}

.popup-family-tag {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 6px;
  font-weight: 600;
}

.popup-count {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 6px;
}

/* Custom cluster styling */
.marker-cluster-small {
  background-color: rgba(233,69,96,0.3) !important;
}
.marker-cluster-small div {
  background-color: rgba(233,69,96,0.7) !important;
  color: #fff !important;
  font-family: 'DM Sans', sans-serif !important;
  font-weight: 700 !important;
}
.marker-cluster-medium {
  background-color: rgba(233,69,96,0.35) !important;
}
.marker-cluster-medium div {
  background-color: rgba(233,69,96,0.75) !important;
  color: #fff !important;
  font-family: 'DM Sans', sans-serif !important;
  font-weight: 700 !important;
}
.marker-cluster-large {
  background-color: rgba(233,69,96,0.4) !important;
}
.marker-cluster-large div {
  background-color: rgba(233,69,96,0.85) !important;
  color: #fff !important;
  font-family: 'DM Sans', sans-serif !important;
  font-weight: 700 !important;
}

/* Location marker pulse */
.location-marker {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--accent);
  border: 3px solid #fff;
  box-shadow: 0 0 0 rgba(233,69,96,0.4);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(233,69,96,0.5); }
  70% { box-shadow: 0 0 0 14px rgba(233,69,96,0); }
  100% { box-shadow: 0 0 0 0 rgba(233,69,96,0); }
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

/* Safe area for notched phones */
@supports(padding: max(0px)) {
  .top-bar { padding-top: max(12px, env(safe-area-inset-top)); }
  .bottom-panel .panel-content { padding-bottom: max(20px, env(safe-area-inset-bottom)); }
}

/* Leaflet overrides for dark theme */
/* Welcome screen */
.welcome-screen {
  position: fixed;
  inset: 0;
  z-index: 2000;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  padding-top: max(24px, env(safe-area-inset-top));
  padding-bottom: max(24px, env(safe-area-inset-bottom));
  text-align: center;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.welcome-screen.hidden { display: none; }

.welcome-title {
  font-family: 'Playfair Display', serif;
  font-size: 34px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 8px;
}

.welcome-subtitle {
  font-size: 17px;
  color: var(--text-dim);
  margin-bottom: 32px;
  line-height: 1.5;
}

.welcome-label {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-dim);
  margin-bottom: 16px;
}

.person-grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 100%;
  max-width: 340px;
}

.person-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 18px 22px;
  border-radius: 14px;
  background: rgba(22,33,62,0.8);
  border: 1.5px solid rgba(255,255,255,0.08);
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
}

.person-card:hover, .person-card:active {
  border-color: var(--accent);
  background: rgba(233,69,96,0.08);
  transform: scale(1.02);
}

.person-avatar {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: 700;
  flex-shrink: 0;
  color: var(--bg);
}

.person-info {
  display: flex;
  flex-direction: column;
}

.person-name {
  font-weight: 600;
  font-size: 18px;
  color: #fff;
}

.person-families {
  font-size: 13px;
  color: var(--text-dim);
  margin-top: 2px;
}

.popup-relation {
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 2px;
}

.leaflet-control-zoom a {
  background: rgba(22,33,62,0.9) !important;
  color: var(--text) !important;
  width: 40px !important;
  height: 40px !important;
  line-height: 40px !important;
  font-size: 22px !important;
  border: none !important;
  backdrop-filter: blur(8px);
}
.leaflet-control-zoom { border: none !important; border-radius: 12px !important; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.3) !important; margin-top: 100px !important; }
.leaflet-control-attribution { display: none; }

.lineage-btn {
  display: inline-block;
  margin-top: 8px;
  padding: 8px 14px;
  font-size: 13px;
  color: var(--accent);
  background: var(--accent)15;
  border: 1px solid var(--accent)40;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.lineage-btn:hover { background: var(--accent)30; }
.lineage-chain {
  margin-top: 8px;
  padding: 8px 10px;
  background: rgba(255,255,255,0.04);
  border-radius: 8px;
  border-left: 2px solid var(--accent);
}
.lineage-step {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 3px 0;
  font-size: 13px;
  color: var(--text-dim);
}
.lineage-step .lname {
  color: var(--text-primary);
  font-size: 13px;
}
.lineage-step.lineage-you .lname {
  color: var(--accent);
  font-weight: 600;
}
.lineage-step.lineage-target .lname {
  color: #ffa726;
  font-weight: 600;
}
.lineage-arrow {
  color: var(--text-dim);
  font-size: 11px;
  padding-left: 4px;
  opacity: 0.5;
}


/* Trivia game */
.trivia-btn { display: none !important; }

.trivia-panel {
  position: fixed;
  bottom: 0; left: 0; right: 0; top: 0;
  z-index: 2500;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.3s ease;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.trivia-panel.open { transform: translateY(0); }

.trivia-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  flex-shrink: 0;
}
.trivia-header-title {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  color: #fff;
}
.trivia-score {
  font-size: 15px;
  color: #7e57c2;
  font-weight: 600;
}
.trivia-close {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
  border: none;
  color: var(--text);
  font-size: 22px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.trivia-body {
  flex: 1;
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.trivia-category {
  font-size: 13px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
}

.trivia-question {
  font-size: 20px;
  font-weight: 600;
  color: #fff;
  text-align: center;
  margin-bottom: 28px;
  line-height: 1.4;
  max-width: 500px;
}

.trivia-options {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  max-width: 400px;
}

.trivia-option {
  padding: 16px 20px;
  border-radius: 14px;
  background: var(--surface);
  border: 2px solid rgba(255,255,255,0.08);
  color: var(--text);
  font-size: 16px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
}
.trivia-option:active { transform: scale(0.98); }
.trivia-option.correct {
  border-color: #66bb6a;
  background: rgba(102,187,106,0.15);
  color: #66bb6a;
}
.trivia-option.wrong {
  border-color: #ef5350;
  background: rgba(239,83,80,0.15);
  color: #ef5350;
}
.trivia-option.reveal {
  border-color: #66bb6a;
  opacity: 0.6;
}
.trivia-option.disabled {
  pointer-events: none;
}

.trivia-feedback {
  margin-top: 20px;
  font-size: 16px;
  text-align: center;
  line-height: 1.5;
  color: var(--text-dim);
  max-width: 400px;
  min-height: 48px;
}
.trivia-feedback strong {
  color: #fff;
}

.trivia-next {
  margin-top: 24px;
  padding: 14px 32px;
  border-radius: 24px;
  background: #7e57c2;
  color: #fff;
  border: none;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.2s;
  display: none;
}

// Fetch actual driving routes from OSRM (free, no API key needed)
(async function loadDrivingRoutes() {
  const routeStyle = { color: '#ffd54f', weight: 3, opacity: 0.7, lineCap: 'round', lineJoin: 'round' };
  
  for (let i = 0; i < ACCOMMODATIONS.length - 1; i++) {
    const a = ACCOMMODATIONS[i], b = ACCOMMODATIONS[i + 1];
    const url = 'https://router.project-osrm.org/route/v1/driving/' +
      a.lng + ',' + a.lat + ';' + b.lng + ',' + b.lat +
      '?overview=full&geometries=geojson';
    
    try {
      const resp = await fetch(url);
      const data = await resp.json();
      if (data.code === 'Ok' && data.routes && data.routes[0]) {
        const coords = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
        const line = L.polyline(coords, routeStyle);
        accomLayer.addLayer(line);
      } else {
        // Fallback to straight line
        accomLayer.addLayer(L.polyline([[a.lat, a.lng], [b.lat, b.lng]], 
          Object.assign({}, routeStyle, { dashArray: '8, 8', opacity: 0.4 })));
      }
    } catch (e) {
      // Fallback to straight dashed line on network error
      accomLayer.addLayer(L.polyline([[a.lat, a.lng], [b.lat, b.lng]], 
        Object.assign({}, routeStyle, { dashArray: '8, 8', opacity: 0.4 })));
    }
  }
})();

function createMarkerIcon(event) {
  const color = EVENT_COLORS[event.eventType] || '#ffa726';
  const family = event.families[0];
  const familyColor = FAMILY_COLORS[family] || '#fff';
  return L.divIcon({
    className: 'custom-marker',
    html: '<div style="width:12px;height:12px;border-radius:50%;background:' + color + ';border:2.5px solid ' + familyColor + ';box-shadow:0 2px 6px rgba(0,0,0,0.4);"></div>',
    iconSize: [12, 12],
    iconAnchor: [6, 6]
  });
}

function groupByLocation(events) {
  const groups = {};
  for (const e of events) {
    const key = Math.round(e.lat * 200) + ',' + Math.round(e.lng * 200);
    if (!groups[key]) groups[key] = [];
    groups[key].push(e);
  }
  return groups;
}

function extractYear(dateStr) {
  if (!dateStr) return 9999;
  const m = dateStr.match(/(\d{4})/);
  return m ? parseInt(m[1]) : 9999;
}

function createPopupContent(events) {
  // Find the most common full place name
  const placeCounts = {};
  events.forEach(e => {
    const p = e.place.trim();
    placeCounts[p] = (placeCounts[p] || 0) + 1;
  });
  const fullPlace = Object.entries(placeCounts).sort((a,b) => b[1] - a[1])[0][0];
  const parts = fullPlace.split(',').map(s => s.trim());
  const mainPlace = parts[0];
  const region = parts.slice(1).join(', ');
  const hasMultiplePlaces = Object.keys(placeCounts).length > 1;
  
  events.sort((a, b) => extractYear(a.date) - extractYear(b.date));
  
  let html = '<div class="popup-location">' + mainPlace + '</div>';
  if (region) html += '<div style="font-size:11px;color:var(--text-dim);margin-bottom:4px;">' + region + '</div>';
  if (hasMultiplePlaces) {
    const altNames = Object.keys(placeCounts).map(p => p.split(',')[0].trim()).filter(n => n !== mainPlace);
    if (altNames.length) html += '<div style="font-size:10px;color:var(--text-dim);margin-bottom:8px;font-style:italic;">Also: ' + altNames.join(', ') + '</div>';
  }
  if (events.length > 1) html += '<div class="popup-count">' + events.length + ' events at this location</div>';
  
  for (const e of events) {
    const color = EVENT_COLORS[e.eventType] || '#ffa726';
    html += '<div class="popup-event">';
    html += '<span class="popup-event-type" style="background:' + color + '22;color:' + color + ';">' + e.eventType + '</span>';
    const personClean = e.person.replace(/ \*$/,'');
    let relLabel = '';
    if (activeViewer && RELATIONSHIPS[activeViewer]) {
      const rm = RELATIONSHIPS[activeViewer];
      if (e.person.includes(' & ')) {
        const parts = e.person.split(' & ');
        const labels = parts.map(p => rm[p.trim()]).filter(Boolean);
        if (labels.length) relLabel = labels.join(' · ');
      } else {
        relLabel = rm[e.person] || '';
      }
    }
    if (relLabel) html += '<div class="popup-relation">Your ' + relLabel + '</div>';
    let ancestryLink = '';
    if ((activeViewer === 'colby' || activeViewer === 'valerie') && !e.person.includes(' & ')) {
      const aid = ANCESTRY_IDS[e.person];
      if (aid) ancestryLink = ' <a href="https://www.ancestry.com/family-tree/person/tree/' + ANCESTRY_TREE + '/person/' + aid + '" target="_blank" rel="noopener" style="font-size:11px;color:var(--accent);text-decoration:none;opacity:0.8;">↗ Ancestry</a>';
    } else if ((activeViewer === 'colby' || activeViewer === 'valerie') && e.person.includes(' & ')) {
      const parts = e.person.split(' & ');
      const links = parts.map(p => {
        const aid = ANCESTRY_IDS[p.trim()];
        return aid ? '<a href="https://www.ancestry.com/family-tree/person/tree/' + ANCESTRY_TREE + '/person/' + aid + '" target="_blank" rel="noopener" style="font-size:11px;color:var(--accent);text-decoration:none;opacity:0.8;">↗</a>' : '';
      }).filter(Boolean);
      if (links.length) ancestryLink = ' ' + links.join(' ');
    }
    html += '<div class="popup-person">' + personClean + ancestryLink + '</div>';
    if (e.date) html += '<div class="popup-date">' + e.date + '</div>';
    if (e.note) html += '<div class="popup-note">' + e.note + '</div>';
    html += '<div class="popup-families">' + e.families.map(f =>
      '<span class="popup-family-tag" style="background:' + FAMILY_COLORS[f] + '33;color:' + FAMILY_COLORS[f] + ';">' + f + '</span>'
    ).join('') + '</div>';
    if (activeViewer) {
      const pn = e.person.replace(/ \*$/, '').trim();
      const hasChain = !e.person.includes(' & ') && LINEAGE[activeViewer] && LINEAGE[activeViewer][pn];
      if (hasChain) {
        const btnId = 'lin-' + Math.random().toString(36).substr(2,6);
        html += '<div class="lineage-btn" onclick="toggleLineage(this,\'' + activeViewer + '\',\'' + pn.replace(/'/g,"\\'") + '\')">🔗 Show my connection</div>';
      }
    }
    html += '</div>';
  }
  return html;
}

function getFilteredEvents() {
  return ALL_EVENTS.filter(e => {
    const familyMatch = e.families.some(f => state.activeFamilies.has(f));
    const typeMatch = state.activeEventTypes.size === 0 || state.activeEventTypes.has(e.eventType);
    return familyMatch && typeMatch;
  });
}

const markersByKey = {};

function updateMarkers() {
  clusterGroup.clearLayers();
  Object.keys(markersByKey).forEach(k => delete markersByKey[k]);
  const filtered = getFilteredEvents();
  const groups = groupByLocation(filtered);
  
  for (const [key, events] of Object.entries(groups)) {
    const e = events[0];
    const marker = L.marker([e.lat, e.lng], { icon: createMarkerIcon(e) });
    marker.bindPopup(createPopupContent(events), { maxWidth: 320, maxHeight: 420 });
    clusterGroup.addLayer(marker);
    markersByKey[key] = marker;
  }
  
  document.getElementById('visibleCount').textContent = filtered.length;
  document.getElementById('totalCount').textContent = ALL_EVENTS.length;
}

function initEventFilters() {
  const container = document.getElementById('eventFilters');
  const typeCounts = {};
  ALL_EVENTS.forEach(e => { typeCounts[e.eventType] = (typeCounts[e.eventType] || 0) + 1; });
  
  EVENT_TYPES.forEach(type => {
    if (!typeCounts[type]) return;
    const btn = document.createElement('button');
    btn.className = 'event-btn active';
    btn.textContent = type + ' (' + typeCounts[type] + ')';
    btn.dataset.type = type;
    btn.addEventListener('click', () => {
      btn.classList.toggle('active');
      if (state.activeEventTypes.has(type)) {
        state.activeEventTypes.delete(type);
      } else {

    });

}

const searchInput = document.getElementById('searchInput');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (q.length < 2) { searchResults.classList.remove('active'); return; }
  
  const matches = [];
  const seen = new Set();
  
  for (const e of ALL_EVENTS) {
    const personKey = e.person.toLowerCase();
    if (personKey.includes(q) && !seen.has(personKey)) {
      seen.add(personKey);
      matches.push({ type: 'person', name: e.person.replace(/ \*$/, ''), event: e });
    }
    const placeKey = e.place.split(',')[0].trim().toLowerCase();
    if (placeKey.includes(q) && !seen.has(placeKey)) {
      seen.add(placeKey);
      matches.push({ type: 'place', name: e.place.split(',')[0].trim(), event: e });
    }
    if (matches.length >= 12) break;
  }
  
  if (matches.length === 0) { searchResults.classList.remove('active'); return; }
  
  searchResults.innerHTML = matches.map(m =>
    '<div class="search-result-item" data-lat="' + m.event.lat + '" data-lng="' + m.event.lng + '" data-name="' + m.name + '">' +
    '<div class="name">' + (m.type === 'person' ? '\u{1F464}' : '\u{1F4CD}') + ' ' + m.name + '</div>' +
    '<div class="detail">' + (m.type === 'person' ? m.event.place.split(',').slice(0,2).join(', ') : m.event.families.join(', ')) + '</div></div>'
  ).join('');
  searchResults.classList.add('active');
});

// Geolocation
const locateBtn = document.getElementById('locateBtn');

locateBtn.addEventListener('click', () => {
  if (state.tracking) {
    if (state.locationWatch) { navigator.geolocation.clearWatch(state.locationWatch); state.locationWatch = null; }
    if (state.locationMarker) { map.removeLayer(state.locationMarker); state.locationMarker = null; }
    state.tracking = false;
    locateBtn.classList.remove('tracking');
    return;
  }
  
  if (!navigator.geolocation) { alert('Geolocation not supported'); return; }
  
  state.tracking = true;
  locateBtn.classList.add('tracking');
  
  function onPos(pos) {
    const {latitude, longitude} = pos.coords;
    if (state.locationMarker) {
      state.locationMarker.setLatLng([latitude, longitude]);
    } else {
      state.locationMarker = L.marker([latitude, longitude], {
        icon: L.divIcon({
          className: 'location-marker-wrapper',
          html: '<div class="location-marker"></div>',
          iconSize: [20, 20], iconAnchor: [10, 10]
        })
      }).addTo(map);
      map.flyTo([latitude, longitude], 10, { duration: 1.5 });
    }
  }
  
  function onErr() {
    alert('Unable to get location. Enable location services.');
    state.tracking = false;
    locateBtn.classList.remove('tracking');
  }
  
  navigator.geolocation.getCurrentPosition(onPos, onErr, { enableHighAccuracy: true, timeout: 10000 });
  state.locationWatch = navigator.geolocation.watchPosition(onPos, onErr, { enableHighAccuracy: true, maximumAge: 30000, timeout: 10000 });
});

function extractYear(dateStr) {
  if (!dateStr) return null;
  const m = dateStr.match(/\b(1[0-9]{3})\b/);
  return m ? parseInt(m[1]) : null;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getViewerAncestors() {
  const rels = RELATIONSHIPS[activeViewer] || {};
  return Object.entries(rels).map(([name, rel]) => ({
    name: name.replace(/ \*$/, '').replace(/^! /, ''),
    rel: rel,
    rawName: name
  })).filter(a => a.name.length > 2 && a.name !== 'a');
}

function getAncestorEvents(ancestorName) {
  return ALL_EVENTS.filter(e => {
    const clean = e.person.replace(/ \*$/, '').replace(/^! /, '');
    return clean === ancestorName;
  });
}

function getRelDepth(rel) {
  if (rel.includes('Grand')) {
    const m = rel.match(/(\d+)(?:st|nd|rd|th)/);
    if (m) return parseInt(m[1]) + 2;
    return rel.includes('Great') ? 3 : 2;
  }
  return 1;
}

function generateQuestions() {
  const ancestors = getViewerAncestors();
  if (ancestors.length < 4) return [];
  
  const questions = [];
  const generators = [
    genWhereQuestion,
    genWhenQuestion,
    genWhoIsRelQuestion,
    genRelationshipQuestion,
    genFamilyLineQuestion,
    genMarriageQuestion,
    genBirthPlaceQuestion,
    genOldestQuestion
  ];
  
  let attempts = 0;
  while (questions.length < TRIVIA_COUNT && attempts < 80) {
    const gen = generators[Math.floor(Math.random() * generators.length)];
    const q = gen(ancestors);
    if (q) {
      // Avoid duplicate question text
      if (!questions.some(existing => existing.question === q.question)) {
        questions.push(q);
      }
    }
    attempts++;
  }
  return questions;
}

function genWhereQuestion(ancestors) {
  const withEvents = ancestors.filter(a => {
    const evts = getAncestorEvents(a.name);
    return evts.some(e => ['Birth','Baptism','Marriage','Death','Burial'].includes(e.eventType));
  });
  if (withEvents.length < 1) return null;
  const pick = withEvents[Math.floor(Math.random() * withEvents.length)];
  const evts = getAncestorEvents(pick.name).filter(e => ['Birth','Baptism','Marriage','Death','Burial'].includes(e.eventType));
  const evt = evts[Math.floor(Math.random() * evts.length)];
  const correctPlace = evt.place.split(',')[0].trim();
  
  // Get wrong places from other events
  const allPlaces = [...new Set(ALL_EVENTS.map(e => e.place.split(',')[0].trim()))].filter(p => p !== correctPlace && p.length > 2);
  if (allPlaces.length < 3) return null;
  const wrongPlaces = shuffle(allPlaces).slice(0, 3);
  
  const options = shuffle([correctPlace, ...wrongPlaces]);
  return {
    category: 'Places',
    question: 'Where did ' + pick.name + ' (your ' + pick.rel.toLowerCase() + ')\'s ' + evt.eventType.toLowerCase() + ' take place?',
    options: options,
    correct: options.indexOf(correctPlace),
    feedback: pick.name + ' (your ' + pick.rel.toLowerCase() + ') — ' + evt.eventType.toLowerCase() + ' in ' + correctPlace + (evt.date ? ' (' + evt.date + ')' : '') + '.'
  };
}

function genWhenQuestion(ancestors) {
  const withDates = ancestors.filter(a => {
    const evts = getAncestorEvents(a.name);
    return evts.some(e => extractYear(e.date) && ['Birth','Death','Marriage'].includes(e.eventType));
  });
  if (withDates.length < 1) return null;
  const pick = withDates[Math.floor(Math.random() * withDates.length)];
  const evts = getAncestorEvents(pick.name).filter(e => extractYear(e.date) && ['Birth','Death','Marriage'].includes(e.eventType));
  const evt = evts[Math.floor(Math.random() * evts.length)];
  const correctYear = extractYear(evt.date);
  
  const offsets = shuffle([-47, -23, 18, 31, -12, 25, -35, 42]).slice(0, 3);
  const wrongYears = offsets.map(o => correctYear + o).filter(y => y > 1550 && y < 1960);
  if (wrongYears.length < 3) return null;
  
  const options = shuffle([String(correctYear), ...wrongYears.slice(0,3).map(String)]);
  return {
    category: 'Dates',
    question: 'In what year was ' + pick.name + ' (your ' + pick.rel.toLowerCase() + ')\'s ' + evt.eventType.toLowerCase() + '?',
    options: options,
    correct: options.indexOf(String(correctYear)),
    feedback: pick.name + ' — ' + evt.eventType.toLowerCase() + ' in ' + correctYear + ' at ' + evt.place.split(',')[0].trim() + '.'
  };
}

function genWhoIsRelQuestion(ancestors) {
  const rels = ['Grandfather', 'Grandmother', 'Great-Grandfather', 'Great-Grandmother', '2nd Great-Grandfather', '2nd Great-Grandmother', '3rd Great-Grandfather', '3rd Great-Grandmother'];
  const available = ancestors.filter(a => rels.includes(a.rel));
  if (available.length < 1) return null;
  const pick = available[Math.floor(Math.random() * available.length)];
  
  const wrongPeople = shuffle(ancestors.filter(a => a.name !== pick.name)).slice(0, 3);
  if (wrongPeople.length < 3) return null;
  
  const options = shuffle([pick.name, ...wrongPeople.map(a => a.name)]);
  return {
    category: 'Family Tree',
    question: 'Who is your ' + pick.rel.toLowerCase() + '?',
    options: options,
    correct: options.indexOf(pick.name),
    feedback: pick.name + ' is your ' + pick.rel.toLowerCase() + '.'
  };
}

function genRelationshipQuestion(ancestors) {
  const pick = ancestors[Math.floor(Math.random() * ancestors.length)];
  const sameDepth = ancestors.filter(a => a.rel === pick.rel && a.name !== pick.name);
  const diffRels = [...new Set(ancestors.map(a => a.rel))].filter(r => r !== pick.rel);
  if (diffRels.length < 3) return null;
  
  const wrongRels = shuffle(diffRels).slice(0, 3);
  const options = shuffle([pick.rel, ...wrongRels]);
  return {
    category: 'Relationships',
    question: 'What is ' + pick.name + '\'s relationship to you?',
    options: options,
    correct: options.indexOf(pick.rel),
    feedback: pick.name + ' is your ' + pick.rel.toLowerCase() + '.'
  };
}

function genFamilyLineQuestion(ancestors) {
  const withFamily = ancestors.filter(a => {
    const evts = getAncestorEvents(a.name);
    return evts.length > 0 && evts[0].families && evts[0].families.length > 0;
  });
  if (withFamily.length < 1) return null;
  const pick = withFamily[Math.floor(Math.random() * withFamily.length)];
  const evts = getAncestorEvents(pick.name);
  const correctFamily = evts[0].families[0];
  
  const allFamilies = ['Seltveit', 'Anderson', 'Kittelson', 'Slinde', 'Tudahl'];
  const wrongFamilies = allFamilies.filter(f => f !== correctFamily);
  if (wrongFamilies.length < 3) return null;
  
  const options = shuffle([correctFamily, ...shuffle(wrongFamilies).slice(0,3)]);
  return {
    category: 'Family Lines',
    question: 'Which family line does ' + pick.name + ' belong to?',
    options: options,
    correct: options.indexOf(correctFamily),
    feedback: pick.name + ' is part of the ' + correctFamily + ' family line.'
  };
}

function genMarriageQuestion(ancestors) {
  const withMarriage = ancestors.filter(a => {
    const evts = getAncestorEvents(a.name);
    return evts.some(e => e.eventType === 'Marriage');
  });
  if (withMarriage.length < 1) return null;
  const pick = withMarriage[Math.floor(Math.random() * withMarriage.length)];
  const evt = getAncestorEvents(pick.name).find(e => e.eventType === 'Marriage');
  const correctPlace = evt.place.split(',')[0].trim();
  
  const allPlaces = [...new Set(ALL_EVENTS.filter(e => e.eventType === 'Marriage').map(e => e.place.split(',')[0].trim()))].filter(p => p !== correctPlace && p.length > 2);
  if (allPlaces.length < 3) return null;
  const wrongPlaces = shuffle(allPlaces).slice(0, 3);
  
  const options = shuffle([correctPlace, ...wrongPlaces]);
  return {
    category: 'Weddings',
    question: 'Where did ' + pick.name + ' (your ' + pick.rel.toLowerCase() + ') get married?',
    options: options,
    correct: options.indexOf(correctPlace),
    feedback: pick.name + ' was married in ' + correctPlace + (evt.date ? ' in ' + evt.date : '') + '.'
  };
}

function genBirthPlaceQuestion(ancestors) {
  const withBirth = ancestors.filter(a => {
    const evts = getAncestorEvents(a.name);
    return evts.some(e => e.eventType === 'Birth' && e.place);
  });
  if (withBirth.length < 1) return null;
  const pick = withBirth[Math.floor(Math.random() * withBirth.length)];
  const evt = getAncestorEvents(pick.name).find(e => e.eventType === 'Birth');
  const correctPlace = evt.place.split(',')[0].trim();
  
  const allPlaces = [...new Set(ALL_EVENTS.filter(e => e.eventType === 'Birth').map(e => e.place.split(',')[0].trim()))].filter(p => p !== correctPlace && p.length > 2);
  if (allPlaces.length < 3) return null;
  const wrongPlaces = shuffle(allPlaces).slice(0, 3);
  
  const options = shuffle([correctPlace, ...wrongPlaces]);
  return {
    category: 'Birthplaces',
    question: 'Where was ' + pick.name + ' (your ' + pick.rel.toLowerCase() + ') born?',
    options: options,
    correct: options.indexOf(correctPlace),
    feedback: pick.name + ' was born in ' + correctPlace + (evt.date ? ' in ' + evt.date : '') + '.'
  };
}

function genOldestQuestion(ancestors) {
  // Find 4 ancestors with birth years and ask which is oldest
  const withBirth = ancestors.filter(a => {
    const evts = getAncestorEvents(a.name);
    return evts.some(e => e.eventType === 'Birth' && extractYear(e.date));
  });
  if (withBirth.length < 4) return null;
  const picks = shuffle(withBirth).slice(0, 4);
  
  const birthYears = picks.map(a => {
    const evt = getAncestorEvents(a.name).find(e => e.eventType === 'Birth' && extractYear(e.date));
    return { name: a.name, year: extractYear(evt.date), rel: a.rel };
  }).sort((a, b) => a.year - b.year);
  
  const oldest = birthYears[0];
  const options = shuffle(picks.map(a => a.name));
  return {
    category: 'History',
    question: 'Which of these ancestors was born earliest?',
    options: options,
    correct: options.indexOf(oldest.name),
    feedback: oldest.name + ' was born in ' + oldest.year + ' — your ' + oldest.rel.toLowerCase() + '.'
  };
}

function startTrivia(level) {
  const qs = (level === 'standard') ? generateStandardQuestions() : generateQuestions();
  triviaState = { questions: qs, current: 0, score: 0, answered: false, level: level || 'advanced' };

function answerTrivia(chosen) {
  if (triviaState.answered) return;
  triviaState.answered = true;
  
  const q = triviaState.questions[triviaState.current];
  const optBtns = document.querySelectorAll('.trivia-option');
  
  optBtns.forEach((btn, i) => {
    btn.classList.add('disabled');
    if (i === q.correct) btn.classList.add('correct');
    if (i === chosen && chosen !== q.correct) btn.classList.add('wrong');
  });
  
  if (chosen === q.correct) {
    triviaState.score++;
    q.wasCorrect = true;
    document.getElementById('triviaFeedback').innerHTML = '✅ <strong>Correct!</strong> ' + q.feedback;
  } else {
    q.wasCorrect = false;
    document.getElementById('triviaFeedback').innerHTML = '❌ <strong>Not quite.</strong> ' + q.feedback;
  }
  
  document.getElementById('triviaScore').textContent = triviaState.score + ' / ' + triviaState.questions.length;
  document.getElementById('triviaTitle').textContent = triviaState.level === 'standard' ? 'Family Trivia' : 'Family Trivia — Advanced';
  
  // Update progress dot
  const dots = document.querySelectorAll('.trivia-dot');
  if (dots[triviaState.current]) {
    dots[triviaState.current].className = 'trivia-dot ' + (q.wasCorrect ? 'correct' : 'wrong');
  }
  
  triviaNext.classList.add('visible');
  triviaNext.textContent = triviaState.current < triviaState.questions.length - 1 ? 'Next Question →' : 'See Results →';
}

function showTriviaFinal() {
  const pct = Math.round(triviaState.score / triviaState.questions.length * 100);
  let msg = '';
  if (pct === 100) msg = 'Perfect score! You really know your Norwegian roots!';
  else if (pct >= 80) msg = 'Excellent! You know your ancestors well.';
  else if (pct >= 60) msg = 'Good job! You\'re learning about your family history.';
  else if (pct >= 40) msg = 'Not bad! Explore the map to learn more about your ancestors.';
  else msg = 'Keep exploring the map — there\'s so much to discover about your family!';
  
  document.getElementById('triviaProgress').innerHTML = '';
  document.getElementById('triviaCategory').textContent = '';
  document.getElementById('triviaQuestion').innerHTML = '';
  document.getElementById('triviaOptions').innerHTML = '';
  document.getElementById('triviaFeedback').innerHTML = '';
  triviaNext.classList.remove('visible');
  
  document.getElementById('triviaQuestion').innerHTML = 
    '<div class="trivia-final">' +
    '<div class="trivia-final-score">' + triviaState.score + '/' + triviaState.questions.length + '</div>' +
    '<div class="trivia-final-label">' + pct + '% correct</div>' +
    '<div class="trivia-final-msg">' + msg + '</div>' +
    '</div>';
  
  triviaNext.textContent = 'Play Again';
  triviaNext.classList.add('visible');
  triviaNext.onclick = () => {
    triviaNext.onclick = null;
    triviaNext.addEventListener('click', () => {
      triviaState.current++;
      if (triviaState.current >= triviaState.questions.length) showTriviaFinal();
      else showTriviaQuestion();
    });
    startTrivia();
  };
}

    {q: 'What is "Telemark" famous for in Norwegian culture?', a: 'Traditional skiing and folk arts', w: ['Viking ships', 'Oil production', 'Arctic exploration'], f: 'Telemark is the birthplace of Telemark skiing and is famous for its rich folk art traditions, rosemaling, and folk music.'},
    {q: 'What was a common reason Norwegians emigrated to America in the 1800s?', a: 'Limited farmland and economic hardship', w: ['Religious persecution', 'Mandatory military service', 'Political exile'], f: 'Most Norwegian emigrants left due to limited farmland (farms were divided among sons) and economic hardship. Over 800,000 Norwegians emigrated between 1825 and 1925.'},
  ];
  const pick = facts[Math.floor(Math.random() * facts.length)];
  const options = shuffle([pick.a, ...pick.w]);
  return {
    category: 'Norwegian Culture',
    question: pick.q,
    options: options,
    correct: options.indexOf(pick.a),
    feedback: pick.f
  };
}

function generateStandardQuestions() {
  const generators = [
    genFamilyRegionQuestion,
    genHowManyFamiliesQuestion,
    genFamilyNameQuestion,
    genMostEventsQuestion,
    genSlindeQuestion,
    genTelemarkQuestion,
    genEventCountQuestion,
    genOldestRecordQuestion,
    genEventTypeBasicQuestion,
    genNorwayFactQuestion,
    genNorwayFactQuestion,
    genNorwayFactQuestion,
    genWhichFamilyFromQuestion,
    genWhichFamilyFromQuestion,
    genAccommodationQuestion,
  ];
  
  const questions = [];
  let attempts = 0;
  const shuffled = shuffle(generators);
  
  for (const gen of shuffled) {
    if (questions.length >= TRIVIA_COUNT) break;
    const q = gen();
    if (q && !questions.some(existing => existing.question === q.question)) {
      questions.push(q);
    }
    attempts++;
    if (attempts > 30) break;
  }
  return questions;
}
