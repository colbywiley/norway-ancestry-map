<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Norway Ancestry Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --surface2: #0f3460;
  --text: #e8e8e8;
  --text-dim: #a0a0b8;
  --accent: #e94560;
  --seltveit: #4fc3f7;
  --anderson: #81c784;
  --kittelson: #ffb74d;
  --slinde: #ce93d8;
  --tudahl: #ff8a65;
  --birth: #4fc3f7;
  --death: #ef5350;
  --marriage: #e91e63;
  --census: #78909c;
  --residence: #8d6e63;
  --baptism: #7e57c2;
  --confirmation: #5c6bc0;
  --burial: #546e7a;
  --emigration: #26a69a;
  --immigration: #66bb6a;
  --event: #ffa726;
  --christening: #ab47bc;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  width: 100vw;
  overflow: hidden;
  position: relative;
}

#map {
  width: 100%;
  height: 100%;
  z-index: 1;
}

/* Top bar */
.top-bar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  background: linear-gradient(180deg, rgba(26,26,46,0.95) 0%, rgba(26,26,46,0.7) 80%, transparent 100%);
  padding: 12px 16px 24px;
  pointer-events: none;
}

.top-bar h1 {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.5px;
  color: #fff;
  pointer-events: auto;
  text-shadow: 0 2px 8px rgba(0,0,0,0.5);
}

.top-bar .subtitle {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 2px;
  letter-spacing: 0.3px;
  pointer-events: auto;
}

/* Search bar */
.search-container {
  position: fixed;
  top: 64px;
  left: 12px;
  right: 12px;
  z-index: 1000;
}

.search-input {
  width: 100%;
  padding: 10px 16px 10px 40px;
  border: none;
  border-radius: 12px;
  background: rgba(22,33,62,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  outline: none;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  transition: box-shadow 0.2s;
}

.search-input:focus {
  box-shadow: 0 4px 20px rgba(233,69,96,0.2), 0 0 0 1px rgba(233,69,96,0.3);
}

.search-input::placeholder { color: var(--text-dim); }

.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  font-size: 16px;
}

.search-results {
  margin-top: 4px;
  background: rgba(22,33,62,0.95);
  backdrop-filter: blur(12px);
  border-radius: 12px;
  max-height: 240px;
  overflow-y: auto;
  display: none;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

.search-results.active { display: block; }

.search-result-item {
  padding: 10px 16px;
  cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  transition: background 0.15s;
}

.search-result-item:hover, .search-result-item:active {
  background: rgba(233,69,96,0.1);
}

.search-result-item .name {
  font-weight: 600;
  font-size: 13px;
}

.search-result-item .detail {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 2px;
}

/* Locate button */
/* Layer switcher */
.layers-btn {
  position: fixed;
  bottom: 232px;
  right: 16px;
  z-index: 1001;
  width: 44px;
  height: 44px;
  border-radius: 12px;
  border: none;
  background: rgba(22,33,62,0.92);
  backdrop-filter: blur(12px);
  color: var(--text);
  font-size: 20px;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.layers-btn:active {
  transform: scale(0.92);
}

.layers-btn.open {
  background: var(--accent);
  color: #fff;
}

.layers-panel {
  position: fixed;
  bottom: 284px;
  right: 16px;
  z-index: 1002;
  background: rgba(22,33,62,0.95);
  backdrop-filter: blur(16px);
  border-radius: 14px;
  padding: 8px 6px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  display: none;
  min-width: 180px;
}

.layers-panel.active { display: block; }

.layer-option {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.15s;
  border: none;
  background: none;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  width: 100%;
  text-align: left;
}

.layer-option:hover, .layer-option:active {
  background: rgba(255,255,255,0.08);
}

.layer-option.active {
  background: rgba(233,69,96,0.15);
  color: #fff;
}

.layer-option .layer-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  border: 2px solid var(--text-dim);
  flex-shrink: 0;
}

.layer-option.active .layer-dot {
  background: var(--accent);
  border-color: var(--accent);
}

.locate-btn {
  position: fixed;
  bottom: 180px;
  right: 16px;
  z-index: 1001;
  width: 44px;
  height: 44px;
  border-radius: 12px;
  border: none;
  background: rgba(22,33,62,0.92);
  backdrop-filter: blur(12px);
  color: var(--text);
  font-size: 20px;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.locate-btn:active {
  transform: scale(0.92);
  background: var(--accent);
}

.locate-btn.tracking {
  background: var(--accent);
  color: #fff;
}

/* Bottom panel */
.bottom-panel {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}

.bottom-panel.collapsed .panel-filters {
  display: none;
}

.panel-handle {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 8px 0 4px;
  cursor: pointer;
  gap: 6px;
}

.panel-handle-bar {
  width: 36px;
  height: 4px;
  border-radius: 2px;
  background: rgba(255,255,255,0.2);
}

.panel-chevron {
  font-size: 12px;
  color: rgba(255,255,255,0.35);
  transition: transform 0.3s;
}

.bottom-panel.collapsed .panel-chevron {
  transform: rotate(180deg);
}

.panel-content {
  background: rgba(22,33,62,0.95);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: 20px 20px 0 0;
  padding: 4px 16px 20px;
  max-height: 50vh;
  overflow-y: auto;
  box-shadow: 0 -4px 32px rgba(0,0,0,0.4);
}

.filter-section {
  margin-bottom: 16px;
}

.filter-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-dim);
  margin-bottom: 8px;
}

.family-filters {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.family-btn {
  padding: 6px 14px;
  border-radius: 20px;
  border: 2px solid;
  background: transparent;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.family-btn[data-family="Seltveit"] { border-color: var(--seltveit); }
.family-btn[data-family="Anderson"] { border-color: var(--anderson); }
.family-btn[data-family="Kittelson"] { border-color: var(--kittelson); }
.family-btn[data-family="Slinde"] { border-color: var(--slinde); }
.family-btn[data-family="Tudahl"] { border-color: var(--tudahl); }

.family-btn.active[data-family="Seltveit"] { background: var(--seltveit); color: #1a1a2e; }
.family-btn.active[data-family="Anderson"] { background: var(--anderson); color: #1a1a2e; }
.family-btn.active[data-family="Kittelson"] { background: var(--kittelson); color: #1a1a2e; }
.family-btn.active[data-family="Slinde"] { background: var(--slinde); color: #1a1a2e; }
.family-btn.active[data-family="Tudahl"] { background: var(--tudahl); color: #1a1a2e; }

.family-btn.select-all {
  border-color: var(--accent);
}

.family-btn.select-all.active {
  background: var(--accent);
  color: #fff;
}

.event-filters {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.event-btn {
  padding: 4px 10px;
  border-radius: 14px;
  border: 1.5px solid rgba(255,255,255,0.15);
  background: transparent;
  color: var(--text-dim);
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.event-btn.active {
  border-color: rgba(255,255,255,0.4);
  background: rgba(255,255,255,0.1);
  color: var(--text);
}

.stats-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-top: 1px solid rgba(255,255,255,0.06);
  margin-top: 8px;
}

.stat {
  font-size: 12px;
  color: var(--text-dim);
}

.stat strong {
  color: var(--accent);
  font-weight: 700;
}

/* Event detail popup */
.leaflet-popup-content-wrapper {
  background: rgba(22,33,62,0.95) !important;
  backdrop-filter: blur(12px);
  border-radius: 14px !important;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
  border: 1px solid rgba(255,255,255,0.08) !important;
  max-width: 280px !important;
}

.leaflet-popup-content {
  color: var(--text) !important;
  font-family: 'DM Sans', sans-serif !important;
  margin: 12px 14px !important;
  font-size: 13px !important;
  max-height: 320px;
  overflow-y: auto;
}

.leaflet-popup-tip {
  background: rgba(22,33,62,0.95) !important;
}

.popup-location {
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 8px;
  color: #fff;
}

.popup-event {
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.popup-event:last-child { border-bottom: none; }

.popup-event-type {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 8px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}

.popup-person {
  font-weight: 600;
  font-size: 13px;
}

.popup-date {
  color: var(--text-dim);
  font-size: 12px;
  margin-top: 2px;
}

.popup-note {
  font-size: 11px;
  color: var(--text-dim);
  font-style: italic;
  margin-top: 3px;
  line-height: 1.4;
}

.popup-families {
  display: flex;
  gap: 4px;
  margin-top: 4px;
}

.popup-family-tag {
  font-size: 9px;
  padding: 1px 6px;
  border-radius: 6px;
  font-weight: 600;
}

.popup-count {
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 6px;
}

/* Custom cluster styling */
.marker-cluster-small {
  background-color: rgba(233,69,96,0.3) !important;
}
.marker-cluster-small div {
  background-color: rgba(233,69,96,0.7) !important;
  color: #fff !important;
  font-family: 'DM Sans', sans-serif !important;
  font-weight: 700 !important;
}
.marker-cluster-medium {
  background-color: rgba(233,69,96,0.35) !important;
}
.marker-cluster-medium div {
  background-color: rgba(233,69,96,0.75) !important;
  color: #fff !important;
  font-family: 'DM Sans', sans-serif !important;
  font-weight: 700 !important;
}
.marker-cluster-large {
  background-color: rgba(233,69,96,0.4) !important;
}
.marker-cluster-large div {
  background-color: rgba(233,69,96,0.85) !important;
  color: #fff !important;
  font-family: 'DM Sans', sans-serif !important;
  font-weight: 700 !important;
}

/* Location marker pulse */
.location-marker {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--accent);
  border: 3px solid #fff;
  box-shadow: 0 0 0 rgba(233,69,96,0.4);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(233,69,96,0.5); }
  70% { box-shadow: 0 0 0 14px rgba(233,69,96,0); }
  100% { box-shadow: 0 0 0 0 rgba(233,69,96,0); }
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

/* Safe area for notched phones */
@supports(padding: max(0px)) {
  .top-bar { padding-top: max(12px, env(safe-area-inset-top)); }
  .bottom-panel .panel-content { padding-bottom: max(20px, env(safe-area-inset-bottom)); }
}

/* Leaflet overrides for dark theme */
/* Welcome screen */
.welcome-screen {
  position: fixed;
  inset: 0;
  z-index: 2000;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  text-align: center;
}

.welcome-screen.hidden { display: none; }

.welcome-title {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 6px;
}

.welcome-subtitle {
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: 32px;
  line-height: 1.5;
}

.welcome-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-dim);
  margin-bottom: 16px;
}

.person-grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 100%;
  max-width: 340px;
}

.person-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 18px;
  border-radius: 14px;
  background: rgba(22,33,62,0.8);
  border: 1.5px solid rgba(255,255,255,0.08);
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
}

.person-card:hover, .person-card:active {
  border-color: var(--accent);
  background: rgba(233,69,96,0.08);
  transform: scale(1.02);
}

.person-avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  flex-shrink: 0;
  color: var(--bg);
}

.person-info {
  display: flex;
  flex-direction: column;
}

.person-name {
  font-weight: 600;
  font-size: 15px;
  color: #fff;
}

.person-families {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 2px;
}

.popup-relation {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 2px;
}

.leaflet-control-zoom a {
  background: rgba(22,33,62,0.9) !important;
  color: var(--text) !important;
  border: none !important;
  backdrop-filter: blur(8px);
}
.leaflet-control-zoom { border: none !important; border-radius: 12px !important; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.3) !important; }
.leaflet-control-attribution { display: none; }
</style>
</head>
<body>

<div class="welcome-screen" id="welcomeScreen">
  <div class="welcome-title">Norway Ancestry Map</div>
  <div class="welcome-subtitle">Explore the places your ancestors<br>lived, married, and were buried in Norway</div>
  <div class="welcome-label">Who are you?</div>
  <div class="person-grid" id="personGrid"></div>
</div>

<div class="top-bar">
  <h1>Norway Ancestry Map</h1>
  <div class="subtitle" id="subtitleBar">Seltveit · Anderson · Kittelson · Slinde · Tudahl</div>
</div>

<div class="search-container">
  <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
  <input type="text" class="search-input" id="searchInput" placeholder="Search people or places...">
  <div class="search-results" id="searchResults"></div>
</div>

<div class="layers-panel" id="layersPanel"></div>
<button class="layers-btn" id="layersBtn" title="Map style">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 2 10 6.5v7L12 22 2 15.5v-7Z"/><path d="m12 22v-6.5"/><path d="m22 8.5-10 7-10-7"/><path d="m2 15.5 10-7 10 7"/></svg>
</button>

<button class="locate-btn" id="locateBtn" title="Show my location">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg>
</button>

<div id="map"></div>

<div class="bottom-panel" id="bottomPanel">
  <div class="panel-content">
    <div class="panel-handle" id="panelHandle"><div class="panel-handle-bar"></div><span class="panel-chevron" id="panelChevron">▼</span></div>
    
    <div class="panel-filters" id="panelFilters">
    <div class="filter-section">
      <div class="filter-label">Family Lines</div>
      <div class="family-filters" id="familyFilters">
        <button class="family-btn select-all active" data-family="all">All</button>
        <button class="family-btn active" data-family="Seltveit">Seltveit</button>
        <button class="family-btn active" data-family="Anderson">Anderson</button>
        <button class="family-btn active" data-family="Kittelson">Kittelson</button>
        <button class="family-btn active" data-family="Slinde">Slinde</button>
        <button class="family-btn active" data-family="Tudahl">Tudahl</button>
      </div>
    </div>
    
    <div class="filter-section">
      <div class="filter-label">Event Types</div>
      <div class="event-filters" id="eventFilters"></div>
    </div>
    
    <div class="filter-section">
      <div class="family-filters">
        <button class="family-btn active" id="accomToggle" style="border-color:#ffd54f;background:#ffd54f22;color:#ffd54f;">🏠 Accommodations</button>
      </div>
    </div>
    </div>
    
    <div class="stats-row">
      <span class="stat">Showing <strong id="visibleCount">0</strong> of <strong id="totalCount">0</strong> events</span>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

// Fetch actual driving routes from OSRM (free, no API key needed)
(async function loadDrivingRoutes() {
  const routeStyle = { color: '#ffd54f', weight: 3, opacity: 0.7, lineCap: 'round', lineJoin: 'round' };
  
  for (let i = 0; i < ACCOMMODATIONS.length - 1; i++) {
    const a = ACCOMMODATIONS[i], b = ACCOMMODATIONS[i + 1];
    const url = 'https://router.project-osrm.org/route/v1/driving/' +
      a.lng + ',' + a.lat + ';' + b.lng + ',' + b.lat +
      '?overview=full&geometries=geojson';
    
    try {
      const resp = await fetch(url);
      const data = await resp.json();
      if (data.code === 'Ok' && data.routes && data.routes[0]) {
        const coords = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
        const line = L.polyline(coords, routeStyle);
        accomLayer.addLayer(line);
      } else {
        // Fallback to straight line
        accomLayer.addLayer(L.polyline([[a.lat, a.lng], [b.lat, b.lng]], 
          Object.assign({}, routeStyle, { dashArray: '8, 8', opacity: 0.4 })));
      }
    } catch (e) {
      // Fallback to straight dashed line on network error
      accomLayer.addLayer(L.polyline([[a.lat, a.lng], [b.lat, b.lng]], 
        Object.assign({}, routeStyle, { dashArray: '8, 8', opacity: 0.4 })));
    }
  }
})();

function createMarkerIcon(event) {
  const color = EVENT_COLORS[event.eventType] || '#ffa726';
  const family = event.families[0];
  const familyColor = FAMILY_COLORS[family] || '#fff';
  return L.divIcon({
    className: 'custom-marker',
    html: '<div style="width:12px;height:12px;border-radius:50%;background:' + color + ';border:2.5px solid ' + familyColor + ';box-shadow:0 2px 6px rgba(0,0,0,0.4);"></div>',
    iconSize: [12, 12],
    iconAnchor: [6, 6]
  });
}

function groupByLocation(events) {
  const groups = {};
  for (const e of events) {
    const key = Math.round(e.lat * 200) + ',' + Math.round(e.lng * 200);
    if (!groups[key]) groups[key] = [];
    groups[key].push(e);
  }
  return groups;
}

function extractYear(dateStr) {
  if (!dateStr) return 9999;
  const m = dateStr.match(/(\d{4})/);
  return m ? parseInt(m[1]) : 9999;
}

function createPopupContent(events) {
  const placeCounts = {};
  events.forEach(e => {
    const p = e.place.split(',')[0].trim();
    placeCounts[p] = (placeCounts[p] || 0) + 1;
  });
  const mainPlace = Object.entries(placeCounts).sort((a,b) => b[1] - a[1])[0][0];
  const region = events[0].place.split(',').slice(1, 3).join(', ').trim();
  
  events.sort((a, b) => extractYear(a.date) - extractYear(b.date));
  
  let html = '<div class="popup-location">' + mainPlace + '</div>';
  if (region) html += '<div style="font-size:11px;color:var(--text-dim);margin-bottom:8px;">' + region + '</div>';
  if (events.length > 1) html += '<div class="popup-count">' + events.length + ' events at this location</div>';
  
  for (const e of events) {
    const color = EVENT_COLORS[e.eventType] || '#ffa726';
    html += '<div class="popup-event">';
    html += '<span class="popup-event-type" style="background:' + color + '22;color:' + color + ';">' + e.eventType + '</span>';
    const personClean = e.person.replace(/ \*$/,'');
    let relLabel = '';
    if (activeViewer && RELATIONSHIPS[activeViewer]) {
      const rm = RELATIONSHIPS[activeViewer];
      if (e.person.includes(' & ')) {
        const parts = e.person.split(' & ');
        const labels = parts.map(p => rm[p.trim()]).filter(Boolean);
        if (labels.length) relLabel = labels.join(' · ');
      } else {
        relLabel = rm[e.person] || '';
      }
    }
    if (relLabel) html += '<div class="popup-relation">Your ' + relLabel + '</div>';
    let ancestryLink = '';
    if ((activeViewer === 'colby' || activeViewer === 'valerie') && !e.person.includes(' & ')) {
      const aid = ANCESTRY_IDS[e.person];
      if (aid) ancestryLink = ' <a href="https://www.ancestry.com/family-tree/person/tree/' + ANCESTRY_TREE + '/person/' + aid + '" target="_blank" rel="noopener" style="font-size:11px;color:var(--accent);text-decoration:none;opacity:0.8;">↗ Ancestry</a>';
    } else if ((activeViewer === 'colby' || activeViewer === 'valerie') && e.person.includes(' & ')) {
      const parts = e.person.split(' & ');
      const links = parts.map(p => {
        const aid = ANCESTRY_IDS[p.trim()];
        return aid ? '<a href="https://www.ancestry.com/family-tree/person/tree/' + ANCESTRY_TREE + '/person/' + aid + '" target="_blank" rel="noopener" style="font-size:11px;color:var(--accent);text-decoration:none;opacity:0.8;">↗</a>' : '';
      }).filter(Boolean);
      if (links.length) ancestryLink = ' ' + links.join(' ');
    }
    html += '<div class="popup-person">' + personClean + ancestryLink + '</div>';
    if (e.date) html += '<div class="popup-date">' + e.date + '</div>';
    if (e.note) html += '<div class="popup-note">' + e.note + '</div>';
    html += '<div class="popup-families">' + e.families.map(f =>
      '<span class="popup-family-tag" style="background:' + FAMILY_COLORS[f] + '33;color:' + FAMILY_COLORS[f] + ';">' + f + '</span>'
    ).join('') + '</div>';
    html += '</div>';
  }
  return html;
}

function getFilteredEvents() {
  return ALL_EVENTS.filter(e => {
    const familyMatch = e.families.some(f => state.activeFamilies.has(f));
    const typeMatch = state.activeEventTypes.size === 0 || state.activeEventTypes.has(e.eventType);
    return familyMatch && typeMatch;
  });
}

function updateMarkers() {
  clusterGroup.clearLayers();
  const filtered = getFilteredEvents();
  const groups = groupByLocation(filtered);
  
  for (const [key, events] of Object.entries(groups)) {
    const e = events[0];
    const marker = L.marker([e.lat, e.lng], { icon: createMarkerIcon(e) });
    marker.bindPopup(createPopupContent(events), { maxWidth: 280, maxHeight: 360 });
    clusterGroup.addLayer(marker);
  }
  
  document.getElementById('visibleCount').textContent = filtered.length;
  document.getElementById('totalCount').textContent = ALL_EVENTS.length;
}

function initEventFilters() {
  const container = document.getElementById('eventFilters');
  const typeCounts = {};
  ALL_EVENTS.forEach(e => { typeCounts[e.eventType] = (typeCounts[e.eventType] || 0) + 1; });
  
  EVENT_TYPES.forEach(type => {
    if (!typeCounts[type]) return;
    const btn = document.createElement('button');
    btn.className = 'event-btn active';
    btn.textContent = type + ' (' + typeCounts[type] + ')';
    btn.dataset.type = type;
    btn.addEventListener('click', () => {
      btn.classList.toggle('active');
      if (state.activeEventTypes.has(type)) {
        state.activeEventTypes.delete(type);
      } else {
        state.activeEventTypes.add(type);
      }
      if (state.activeEventTypes.size === EVENT_TYPES.filter(t => typeCounts[t]).length) {
        state.activeEventTypes.clear();
        container.querySelectorAll('.event-btn').forEach(b => b.classList.add('active'));
      }
      updateMarkers();
    });
    container.appendChild(btn);
  });
}

document.getElementById('familyFilters').addEventListener('click', (e) => {
  const btn = e.target.closest('.family-btn');
  if (!btn) return;
  const family = btn.dataset.family;
  const familyNames = ['Seltveit', 'Anderson', 'Kittelson', 'Slinde', 'Tudahl'];
  
  if (family === 'all') {
    const allActive = familyNames.every(f => state.activeFamilies.has(f));
    if (allActive) {
      familyNames.forEach(f => state.activeFamilies.delete(f));
      document.querySelectorAll('.family-btn').forEach(b => b.classList.remove('active'));
    } else {
      familyNames.forEach(f => state.activeFamilies.add(f));
      document.querySelectorAll('.family-btn').forEach(b => b.classList.add('active'));
    }
  } else {
    btn.classList.toggle('active');
    if (state.activeFamilies.has(family)) {
      state.activeFamilies.delete(family);
    } else {
      state.activeFamilies.add(family);
    }
    const allBtn = document.querySelector('.family-btn[data-family="all"]');
    allBtn.classList.toggle('active', familyNames.every(f => state.activeFamilies.has(f)));
  }
  updateMarkers();
});

const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (q.length < 2) { searchResults.classList.remove('active'); return; }
  
  const matches = [];
  const seen = new Set();
  
  for (const e of ALL_EVENTS) {
    const personKey = e.person.toLowerCase();
    if (personKey.includes(q) && !seen.has(personKey)) {
      seen.add(personKey);
      matches.push({ type: 'person', name: e.person.replace(/ \*$/, ''), event: e });
    }
    const placeKey = e.place.split(',')[0].trim().toLowerCase();
    if (placeKey.includes(q) && !seen.has(placeKey)) {
      seen.add(placeKey);
      matches.push({ type: 'place', name: e.place.split(',')[0].trim(), event: e });
    }
    if (matches.length >= 12) break;
  }
  
  if (matches.length === 0) { searchResults.classList.remove('active'); return; }
  
  searchResults.innerHTML = matches.map(m =>
    '<div class="search-result-item" data-lat="' + m.event.lat + '" data-lng="' + m.event.lng + '" data-name="' + m.name + '">' +
    '<div class="name">' + (m.type === 'person' ? '\u{1F464}' : '\u{1F4CD}') + ' ' + m.name + '</div>' +
    '<div class="detail">' + (m.type === 'person' ? m.event.place.split(',').slice(0,2).join(', ') : m.event.families.join(', ')) + '</div></div>'
  ).join('');
  searchResults.classList.add('active');
});

searchResults.addEventListener('click', (e) => {
  const item = e.target.closest('.search-result-item');
  if (!item) return;
  map.flyTo([parseFloat(item.dataset.lat), parseFloat(item.dataset.lng)], 13, { duration: 1 });
  searchInput.value = item.dataset.name;
  searchResults.classList.remove('active');
  searchInput.blur();
});

document.addEventListener('click', (e) => {
  if (!e.target.closest('.search-container')) searchResults.classList.remove('active');
});

// Geolocation
const locateBtn = document.getElementById('locateBtn');

locateBtn.addEventListener('click', () => {
  if (state.tracking) {
    if (state.locationWatch) { navigator.geolocation.clearWatch(state.locationWatch); state.locationWatch = null; }
    if (state.locationMarker) { map.removeLayer(state.locationMarker); state.locationMarker = null; }
    state.tracking = false;
    locateBtn.classList.remove('tracking');
    return;
  }
  
  if (!navigator.geolocation) { alert('Geolocation not supported'); return; }
  
  state.tracking = true;
  locateBtn.classList.add('tracking');
  
  function onPos(pos) {
    const {latitude, longitude} = pos.coords;
    if (state.locationMarker) {
      state.locationMarker.setLatLng([latitude, longitude]);
    } else {
      state.locationMarker = L.marker([latitude, longitude], {
        icon: L.divIcon({
          className: 'location-marker-wrapper',
          html: '<div class="location-marker"></div>',
          iconSize: [20, 20], iconAnchor: [10, 10]
        })
      }).addTo(map);
      map.flyTo([latitude, longitude], 10, { duration: 1.5 });
    }
  }
  
  function onErr() {
    alert('Unable to get location. Enable location services.');
    state.tracking = false;
    locateBtn.classList.remove('tracking');
  }
  
  navigator.geolocation.getCurrentPosition(onPos, onErr, { enableHighAccuracy: true, timeout: 10000 });
  state.locationWatch = navigator.geolocation.watchPosition(onPos, onErr, { enableHighAccuracy: true, maximumAge: 30000, timeout: 10000 });
});


// Welcome screen
function buildWelcomeScreen() {
  const grid = document.getElementById('personGrid');
  for (const [key, m] of Object.entries(TRIP_MEMBERS)) {
    const card = document.createElement('div');
    card.className = 'person-card';
    card.dataset.key = key;
    const familyStr = m.families.join(' · ');
    card.innerHTML = '<div class="person-avatar" style="background:' + m.color + ';">' + m.initials + '</div>' +
      '<div class="person-info"><div class="person-name">' + m.full + '</div>' +
      '<div class="person-families">' + familyStr + '</div></div>';
    card.addEventListener('click', () => selectViewer(key));
    grid.appendChild(card);
  }
}

function selectViewer(key) {
  activeViewer = key;
  const m = TRIP_MEMBERS[key];
  
  // Set active families to this person's default
  state.activeFamilies.clear();
  m.families.forEach(f => state.activeFamilies.add(f));
  
  // Update family filter buttons
  const familyNames = ['Seltveit','Anderson','Kittelson','Slinde','Tudahl'];
  document.querySelectorAll('.family-btn').forEach(btn => {
    const fam = btn.dataset.family;
    if (fam === 'all') {
      btn.classList.toggle('active', familyNames.every(f => state.activeFamilies.has(f)));
    } else {
      btn.classList.toggle('active', state.activeFamilies.has(fam));
    }
  });
  
  // Update subtitle
  document.getElementById('subtitleBar').textContent = m.full + "'s Ancestors";
  
  // Hide welcome, show map
  document.getElementById('welcomeScreen').classList.add('hidden');
  
  // Trigger map resize and update
  setTimeout(() => {
    map.invalidateSize();
    updateMarkers();
    if (typeof repositionButtons === 'function') repositionButtons();
  }, 100);
}

buildWelcomeScreen();

// Collapsible bottom panel & dynamic button positioning
const bottomPanel = document.getElementById('bottomPanel');
const panelHandle = document.getElementById('panelHandle');
const panelFilters = document.getElementById('panelFilters');
const layersBtnEl = document.getElementById('layersBtn');
const locateBtnEl = document.getElementById('locateBtn');
const layersPanelEl = document.getElementById('layersPanel');

function repositionButtons() {
  requestAnimationFrame(() => {
    const panelRect = bottomPanel.getBoundingClientRect();
    const panelTop = window.innerHeight - panelRect.height;
    const offset = panelRect.height;
    
    locateBtnEl.style.bottom = (offset + 12) + 'px';
    layersBtnEl.style.bottom = (offset + 12 + 52) + 'px';
    layersPanelEl.style.bottom = (offset + 12 + 52 + 52) + 'px';
  });
}

panelHandle.addEventListener('click', () => {
  bottomPanel.classList.toggle('collapsed');
  setTimeout(repositionButtons, 50);
});

// Reposition on load and resize
window.addEventListener('resize', repositionButtons);
setTimeout(repositionButtons, 100);

// Reposition after filter changes too
document.getElementById('familyFilters').addEventListener('click', () => setTimeout(repositionButtons, 50));
initEventFilters();
updateMarkers();
</script>
